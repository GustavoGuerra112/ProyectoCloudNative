version: "3.9"

services:

  redis:
    image: redis:7-alpine          
    ports:
      - "6379:6379"                
    restart: always

  backend:
    build: ./backend              
    ports:
      - "8000:8000"
    depends_on:
      - redis                     
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: always

  worker1:
    build: ./worker                
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: always

  worker2:
    build: ./worker
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: always

  worker3:
    build: ./worker
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: always

  frontend:
    image: nginx:alpine           
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html 
    restart: always
